<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabelas monitoradas - Monitor de Amonia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Tabelas monitoradas</h1>
        <p class="subtitle">Cadastre e acesse cada tabela SQL Server monitorada pelo sistema.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Adicionar tabela</h2>
      <form id="addTableForm">
        <div class="form-row">
          <label for="newSchema">Schema</label>
          <input type="text" id="newSchema" class="text-input" placeholder="dbo" />
        </div>
        <div class="form-row">
          <label for="newTable">Nome da tabela</label>
          <input type="text" id="newTable" class="text-input" placeholder="tab_monitor_sensores_amonia_XYZ" required />
        </div>
        <div class="form-row">
          <label for="newTimestampColumn">Coluna de timestamp</label>
          <input type="text" id="newTimestampColumn" class="text-input" placeholder="E3TimeStamp" />
        </div>
        <div class="form-row">
          <label for="newDisplayName">Nome de exibicao (opcional)</label>
          <input type="text" id="newDisplayName" class="text-input" placeholder="Deixe em branco para usar o nome da tabela" />
        </div>
        <div class="form-row">
          <span></span>
          <button type="submit" class="btn primary" id="addTableBtn">Adicionar tabela</button>
        </div>
      </form>
      <p id="addTableStatus"></p>
    </section>

    <section class="panel">
      <h2>Tabelas cadastradas</h2>
      <div id="tableList">
        <p class="empty-state">Carregando...</p>
      </div>
    </section>
  </main>

  <script src="landing.js"></script>
</body>
</html>

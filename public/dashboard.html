<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Sensores - Monitor de Amonia</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Painel de Sensores</h1>
        <p class="subtitle" id="headerSubtitle">Carregando...</p>
      </div>
      <a class="btn secondary" href="index.html">Configurar sensores</a>
    </div>
  </header>

  <main class="dashboard-main">
    <section class="kpi-row" id="kpiRow"></section>

    <section class="overview-charts">
      <div class="panel donut-panel">
        <div class="panel-header"><h2>Status dos sensores</h2></div>
        <div id="donutWrap"></div>
      </div>
      <div class="panel highlight-panel">
        <div class="panel-header"><h2 id="highlightTitle">Concentracao</h2></div>
        <div id="highlightWrap"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header"><h2>Sensores em falha por horario</h2></div>
      <div id="failureTimelineWrap"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Sensores habilitados</h2>
        <div class="panel-actions">
          <input type="search" id="searchInput" placeholder="Filtrar sensor pelo nome..." />
        </div>
      </div>
      <p class="toolbar-hint" id="selectionHint"></p>
      <div id="cardSections">
        <p class="empty-state">Carregando sensores...</p>
      </div>
    </section>

    <section id="detailSections"></section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
